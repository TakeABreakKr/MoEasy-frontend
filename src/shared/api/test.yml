openapi: 3.0.2
info:
  title: Example API
  description: This is an example API
  version: 1.0.0

paths:
  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: number
      responses:
        200:
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                  name:
                    type: string

definitions:
  User:
    type: object
    properties:
      id:
        type: number
      name:
        type: string
